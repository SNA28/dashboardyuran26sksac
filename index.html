<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Anne's Fee System 2026 | Corporate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { 
            --navy-deep: #050a18; /* Navy sangat gelap */
            --navy-prime: #0a1931; /* Navy koperat */
            --gold-metallic: #c5a059;
            --gold-light: #e2c275;
            --slate-bg: #f8fafc;
            --white: #ffffff;
            --status-success: #16a34a; /* Hijau */
            --status-pending: #e11d48; /* Merah */
        }
        
        body { 
            background-color: var(--slate-bg);
            color: #1e293b; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Hero Header - Fokus Navy Blue & Lencana */
        .header-section { 
            background: linear-gradient(180deg, var(--navy-deep) 0%, var(--navy-prime) 100%); 
            padding: 60px 0; 
            text-align: center; 
            border-bottom: 4px solid var(--gold-metallic);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .logo-wrapper {
            margin-bottom: 25px;
        }

        .logo-container {
            background: white;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            padding: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
            border: 3px solid var(--gold-metallic);
            overflow: hidden;
        }

        .school-logo { 
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        h1 { 
            font-family: 'Cinzel', serif; 
            font-weight: 700;
            color: var(--white);
            font-size: 2.2rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .sub-title {
            color: var(--gold-light);
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        /* Stat Cards */
        .stat-card {
            background: var(--white); 
            border-radius: 12px;
            padding: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--navy-prime);
            transition: 0.3s;
        }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block;}
        .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--navy-deep); }

        /* Content Container */
        .main-card {
            background: var(--white); 
            border-radius: 15px;
            padding: 25px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            height: 100%;
        }

        .section-title {
            font-weight: 800;
            color: var(--navy-deep);
            border-left: 5px solid var(--gold-metallic);
            padding-left: 15px;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        /* Button & Form */
        .btn-navy {
            background: var(--navy-prime);
            color: white;
            font-weight: 700;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            border: none;
            transition: 0.3s;
        }
        .btn-navy:hover {
            background: var(--gold-metallic);
            color: var(--navy-deep);
        }

        /* Table Styling */
        .table thead th {
            background: var(--navy-prime);
            color: white;
            font-size: 0.75rem;
            text-transform: uppercase;
            padding: 15px;
        }
        
        .badge-success { background: #dcfce7; color: var(--status-success); border: 1px solid #86efac; }
        .badge-danger { background: #fee2e2; color: var(--status-pending); border: 1px solid #fca5a5; }

        #btnAdmin { position: fixed; bottom: 20px; right: 20px; border-radius: 50%; width: 45px; height: 45px; background: white; border: 1px solid #ddd; color: #ccc; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="container">
        <div class="logo-wrapper">
            <div class="logo-container">
                <img src="image.jpeg" alt="Lencana St. Anne" class="school-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5351/5351333.png'; this.style.opacity='0.5';">
            </div>
        </div>
        <h1>ST. ANNE'S <span style="color: var(--gold-metallic);">PRIMARY</span></h1>
        <div class="sub-title">Sistem Pengurusan Sumbangan 2026</div>
    </div>
</div>

<div class="container py-5">
    <div class="row g-4 mb-5 text-center">
        <div class="col-md-4">
            <div class="stat-card">
                <span class="stat-label">Kutipan Terkumpul</span>
                <span class="stat-val" id="totalSemasa">RM 0</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card" style="border-top-color: var(--gold-metallic)">
                <span class="stat-label">Sumbangan PIBG</span>
                <span class="stat-val" id="totalPIBG">RM 0</span>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <span class="stat-label">Jumlah Pembayar</span>
                <span class="stat-val" id="countSelesai">0</span>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="main-card">
                <div class="section-title">DAFTAR BAYARAN</div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">PILIH KELAS</label>
                    <select id="selKelas" class="form-select"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">NAMA MURID</label>
                    <select id="selNama" class="form-select"></select>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-bold">AMAUN (RM)</label>
                    <select id="selAmaun" class="form-select">
                        <option value="170">KOMBO (RM170)</option>
                        <option value="100">PIBG (RM100)</option>
                        <option value="70">TAMBAHAN (RM70)</option>
                    </select>
                </div>
                <button class="btn btn-navy" id="btnSimpan">SIMPAN REKOD</button>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="main-card">
                <div class="section-title">STATUS KESELURUHAN (HIJAU: SELESAI, MERAH: PENDING)</div>
                <div style="height: 350px;">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<button id="btnAdmin"><i class="fas fa-lock"></i></button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBQeOvoELEHNAG1uFRHV5Vi9XsM561GxH4",
        authDomain: "sistem-yuran-pibg.firebaseapp.com",
        databaseURL: "https://sistem-yuran-pibg-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-yuran-pibg",
        storageBucket: "sistem-yuran-pibg.firebasestorage.app",
        messagingSenderId: "1035670078486",
        appId: "1:1035670078486:web:adbc719663e5f9b5a1e137"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'yuran_2026');

    // Data murid dikekalkan (anda boleh tambah senarai penuh di sini)
    const rawData = {
        "1 Daffodils": ["AAIRA SOPHEA BINTI HAZMEER", "AILEEN SURAIYA BINTI MUHAMMAD NURSYAHMI", "AYRA NADHIRAH BINTI ABDUL RAZAK"],
        "1 Camellia": ["AFIQAH BINTI HALIDZAN", "AL ZAHRA ROSE BINTI JEFRY"],
        // ... tambah kelas lain di sini
    };

    let pieChart;

    function updateChart(sudah, belum) {
        const ctx = document.getElementById('pieChart').getContext('2d');
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Selesai', 'Pending'],
                datasets: [{
                    data: [sudah, belum],
                    backgroundColor: ['#16a34a', '#e11d48'], // Hijau & Merah
                    borderWidth: 5,
                    borderColor: '#ffffff'
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }

    // Populate Dropdowns
    const selK = document.getElementById('selKelas');
    selK.innerHTML = '<option value="">-- Pilih Kelas --</option>';
    Object.keys(rawData).forEach(k => selK.innerHTML += `<option value="${k}">${k}</option>`);

    selK.onchange = function() {
        const selN = document.getElementById('selNama');
        selN.innerHTML = '<option value="">-- Pilih Nama --</option>';
        if(rawData[this.value]) rawData[this.value].forEach(n => selN.innerHTML += `<option value="${n}">${n}</option>`);
    };

    document.getElementById('btnSimpan').onclick = function() {
        const n = document.getElementById('selNama').value;
        const k = document.getElementById('selKelas').value;
        const a = document.getElementById('selAmaun').value;
        if(!n || !k) return alert("Pilih Nama & Kelas!");
        push(dbRef, { nama: n, kelas: k, amaun: parseInt(a), tarikh: new Date().toLocaleDateString() });
        alert("Berjaya disimpan!");
    };

    onValue(dbRef, (snap) => {
        const data = snap.val() || {};
        let tKoleksi = 0, tPIBG = 0, countS = 0;
        let paidNames = new Set();

        Object.values(data).forEach(item => {
            tKoleksi += item.amaun;
            if(item.amaun >= 100) tPIBG += 100;
            paidNames.add(item.nama);
            countS++;
        });

        // Kira baki (contoh 100 orang total)
        const totalMurid = 100; 
        document.getElementById('totalSemasa').innerText = "RM " + tKoleksi;
        document.getElementById('totalPIBG').innerText = "RM " + tPIBG;
        document.getElementById('countSelesai').innerText = countS;
        updateChart(countS, totalMurid - countS);
    });
</script>
</body>
</html>
